name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install system dependencies for cairosvg
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2

      - name: Install project
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Dead code detection (vulture)
        run: |
          uv run --with vulture==2.7 vulture \
            app.py avatar.py door_agents.py generate.py build_universal_svg.py \
            --min-confidence 80 --exclude tests/,scripts/

      - name: Lint GitHub Actions workflows (actionlint)
        uses: rhysd/actionlint@v1.6.26

      - name: Check TOML formatting (taplo)
        uses: uncenter/setup-taplo@v1
        with:
          version: '0.9.3'

      - name: Run taplo format check
        run: taplo format --check

      - name: Run tests
        run: uv run pytest tests/ -v
