name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run ruff (linting and formatting)
        run: uvx ruff check --exit-non-zero-on-fix .

      - name: Run vulture (dead code detection)
        run: uv run vulture src .vulture --min-confidence 80 --exclude tests/

      - name: Run actionlint (workflow linting)
        uses: rhysd/actionlint@v1.6.26

      - name: Run shellcheck (shell script linting)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

      - name: Run taplo (TOML formatting check)
        uses: uncenter/setup-taplo@v1
        with:
          version: '0.9.3'

      - name: Check TOML formatting
        run: taplo format --check "**/*.toml"

      - name: Run pytest (tests)
        run: uv run pytest
