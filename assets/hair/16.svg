<svg width="70" height="30" viewBox="0 0 70 30" fill="none" xmlns="http://www.w3.org/2000/svg" data-z-order="front" data-width-percent="120" data-position-x="body-center" data-position-y="eyes" data-anchor="center" data-color='["#A47E69", "#A2AD47", "#7CAB6A", "#37759C", "#8C6BB1", "#9FA7A6", "#F34B65", "#231F20"]'>
  <!-- aviator glasses - simplified to 4 paths only -->
  
  <defs>
    <linearGradient id="lensGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:currentColor;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:currentColor;stop-opacity:0.5" />
    </linearGradient>
  </defs>

<!-- Left lens - aviator teardrop shape with gradient -->
<path d="M12 8 C10 12, 10 18, 12 22 C16 26, 22 26, 28 22 C32 18, 34 12, 32 8 C29 5, 23 5, 18 6 C15 7, 12 8, 12 8 Z" fill="url(#lensGradient)" stroke="#231F20" stroke-width="2"/>

<!-- Right lens - aviator teardrop shape with gradient -->
<path d="M58 8 C60 12, 60 18, 58 22 C54 26, 48 26, 42 22 C38 18, 36 12, 38 8 C41 5, 47 5, 52 6 C55 7, 58 8, 58 8 Z" fill="url(#lensGradient)" stroke="#231F20" stroke-width="2"/>

<!-- Left arm -->
<path d="M10 15L0 15" stroke="#231F20" stroke-width="3"/>

<!-- Right arm -->
<path d="M60 15L70 15" stroke="#231F20" stroke-width="3"/>
</svg>