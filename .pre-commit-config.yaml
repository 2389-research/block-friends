---
repos:
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.11.8
      hooks:
          - id: ruff
            args: [--fix, --exit-non-zero-on-fix]

    - repo: https://github.com/jendrikseipp/vulture
      rev: v2.7
      hooks:
          - id: vulture
            args:
                - app.py
                - avatar.py
                - door_agents.py
                - generate.py
                - build_universal_svg.py
                - --min-confidence
                - "80"
                - --exclude
                - tests/,scripts/

    - repo: https://github.com/rhysd/actionlint
      rev: v1.6.26
      hooks:
          - id: actionlint

    - repo: https://github.com/shellcheck-py/shellcheck-py
      rev: v0.9.0.6
      hooks:
          - id: shellcheck

    - repo: https://github.com/ComPWA/taplo-pre-commit
      rev: v0.9.3
      hooks:
          - id: taplo-format

    - repo: local
      hooks:
          - id: python-test
            name: "python: tests"
            description: "Run all python tests"
            entry: uv run pytest
            language: system
            types: [python]
            pass_filenames: false
